<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8C42"/>
      <stop offset="100%" stop-color="#E55A20"/>
    </linearGradient>
  </defs>

  <!-- Orange rounded square background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Document shadow -->
  <rect x="26" y="17" width="52" height="66" rx="7" fill="rgba(0,0,0,0.15)"/>

  <!-- Document body -->
  <rect x="22" y="13" width="52" height="66" rx="7" fill="white"/>

  <!-- Folded top-right corner -->
  <path d="M60 13 L74 13 L74 27 Z" fill="rgba(229,90,32,0.15)"/>
  <path d="M60 13 L60 27 L74 27 Z" fill="rgba(0,0,0,0.08)"/>

  <!-- List lines -->
  <rect x="31" y="30" width="30" height="4" rx="2" fill="#EDEDED"/>
  <rect x="31" y="40" width="22" height="4" rx="2" fill="#EDEDED"/>

  <!-- Bold checkmark -->
  <path d="M29 58 L41 72 L71 43"
        stroke="#FF6B35"
        stroke-width="7.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Subtle dot accent at check start -->
  <circle cx="29" cy="58" r="4" fill="#FF6B35"/>
</svg>
